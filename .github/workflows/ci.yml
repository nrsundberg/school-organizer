name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING=1 npx prisma generate
      - run: npm run typecheck
      - run: npm run test

name: E2E

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  e2e:
    # Three parallel shards cover the Playwright projects defined in
    # playwright.config.ts:
    #   - desktop-chromium → `chromium` project (all non-mobile specs)
    #   - mobile-iphone    → `mobile-iphone` project (smoke.mobile.spec.ts under iPhone 13 / WebKit)
    #   - mobile-pixel     → `mobile-pixel` project (smoke.mobile.spec.ts under Pixel 7 / Chromium)
    #
    # Each shard installs only the browsers it needs. The cache key is
    # scoped by browser so shards don't invalidate each other's caches.
    # fail-fast is off so a mobile regression doesn't hide a desktop one
    # and vice versa.
    name: e2e (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: desktop-chromium
            project: chromium
            browser: chromium
          - name: mobile-iphone
            project: mobile-iphone
            browser: webkit
          - name: mobile-pixel
            project: mobile-pixel
            browser: chromium
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING=1 npx prisma generate

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.shard.browser }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.shard.browser }}

      - name: Install Playwright system deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.shard.browser }}

      - name: Write .dev.vars for wrangler dev
        run: |
          BETTER_AUTH_SECRET=$(openssl rand -hex 32)
          cat > .dev.vars <<EOF
          BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
          STRIPE_SECRET_KEY=sk_test_stub
          STRIPE_WEBHOOK_SECRET=whsec_stub
          STRIPE_CAR_LINE_PRICE_ID=price_stub_carline_monthly
          STRIPE_CAMPUS_PRICE_ID=price_stub_campus_monthly
          EOF

      # wrangler.jsonc points `assets.directory` at ./build/client, so the
      # Playwright webServer (`npx wrangler dev`) needs the build output to
      # exist before it boots. Prisma generate already ran above, so skip the
      # duplicate inside `npm run build` by calling react-router directly.
      - name: Build client + worker bundle
        run: npx react-router build

      # wrangler dev --local spins up a fresh empty SQLite on every CI run.
      # Without applying migrations, every SSR loader crashes on
      # `no such table: main.Org` and all Playwright tests timeout on empty
      # error pages. Seed the local D1 before starting the webServer.
      - name: Apply D1 migrations to local dev DB
        run: npx wrangler d1 migrations apply school-organizer --local

      - name: Run E2E tests
        run: npx playwright test --project=${{ matrix.shard.project }} --reporter=list,github,html

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard.name }}
          path: playwright-report/
          retention-days: 14
